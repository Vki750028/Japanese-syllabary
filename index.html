<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日文反應訓練</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  text-align: center;
}

#menu { margin-top: 80px; }

button, select {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
}

#game { display: none; }

#question {
  font-size: 60px;
  margin-top: 10px;
}

#timer { margin: 5px; }

#startScreen {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000c;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

#options {
  position: relative;
  width: 100vw;
  overflow: hidden;
}

.option {
  position: absolute;
  border-radius: 50%;
  background: #333;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

/* 準心模式 */
body.aim-mode,
body.aim-mode * {
  cursor: crosshair !important;
}
</style>
</head>

<body>

<!-- 首頁 -->
<div id="menu">
  <h1>日文反應訓練</h1>

  <select id="difficulty">
    <option value="basic">初級（50音）</option>
    <option value="advanced">中級（+濁音）</option>
    <option value="all">全部（最難）</option>
  </select><br>

  <button onclick="chooseMode('normal')">🎯 普通模式</button>
  <button id="aimBtn" onclick="chooseMode('aim')">🔫 準星模式</button>
</div>

<!-- 開始畫面 -->
<div id="startScreen">
  <div>點擊開始</div>
  <button onclick="beginGame()">開始</button>
</div>

<!-- 遊戲 -->
<div id="game">
  <div id="question"></div>
  <div id="timer"></div>
  <div id="options"></div>
</div>

<script>
// 📱 手機判斷
const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
if (isMobile) {
  document.getElementById("aimBtn").style.display = "none";
}

// ===== 題庫 =====
const DATA = {
  basic: [
    { jp:"あ",romaji:"a"},{ jp:"い",romaji:"i"},{ jp:"う",romaji:"u"},{ jp:"え",romaji:"e"},{ jp:"お",romaji:"o"},
    { jp:"か",romaji:"ka"},{ jp:"き",romaji:"ki"},{ jp:"く",romaji:"ku"},{ jp:"け",romaji:"ke"},{ jp:"こ",romaji:"ko"},
    { jp:"さ",romaji:"sa"},{ jp:"し",romaji:"shi"},{ jp:"す",romaji:"su"},{ jp:"せ",romaji:"se"},{ jp:"そ",romaji:"so"},
    { jp:"た",romaji:"ta"},{ jp:"ち",romaji:"chi"},{ jp:"つ",romaji:"tsu"},{ jp:"て",romaji:"te"},{ jp:"と",romaji:"to"}
  ],
  advanced: [
    { jp:"が",romaji:"ga"},{ jp:"ぎ",romaji:"gi"},{ jp:"ぐ",romaji:"gu"},{ jp:"げ",romaji:"ge"},{ jp:"ご",romaji:"go"}
  ],
  expert: [
    { jp:"きゃ",romaji:"kya"},{ jp:"きゅ",romaji:"kyu"},{ jp:"きょ",romaji:"kyo"}
  ]
};

let mode, questions = [], current = 0, startTime;

// 選模式
function chooseMode(m) {
  mode = m;
  document.getElementById("menu").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
}

// 開始
function beginGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("game").style.display = "block";

  if (mode === "aim") document.body.classList.add("aim-mode");

  // 🎯 選難度
  const diff = document.getElementById("difficulty").value;

  let pool = [];
  if (diff === "basic") pool = [...DATA.basic];
  else if (diff === "advanced") pool = [...DATA.basic, ...DATA.advanced];
  else pool = [...DATA.basic, ...DATA.advanced, ...DATA.expert];

  // 🔥 隨機 + 只取10題
  questions = pool.sort(() => Math.random() - 0.5).slice(0, 10);

  current = 0;
  startTime = Date.now();

  setGameArea();
  updateTimer();
  showQuestion();
}

// 高度修正
function setGameArea() {
  document.getElementById("options").style.height =
    (window.innerHeight - 140) + "px";
}
window.addEventListener("resize", setGameArea);

// 計時
function updateTimer() {
  const t = ((Date.now() - startTime) / 1000).toFixed(1);
  document.getElementById("timer").innerText = t + "s";
  requestAnimationFrame(updateTimer);
}

// 題目
function showQuestion() {
  const q = questions[current];
  document.getElementById("question").innerText = q.jp;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  let choices = [q.romaji];

  while (choices.length < 4) {
    const r = DATA.basic[Math.floor(Math.random()*DATA.basic.length)].romaji;
    if (!choices.includes(r)) choices.push(r);
  }

  choices.sort(() => Math.random() - 0.5);

  const rect = optionsDiv.getBoundingClientRect();
  const placed = [];

  choices.forEach(c => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = c;

    let size = 60 + Math.random() * 40;

    let x, y, safe = false;

    while (!safe) {
      safe = true;
      x = Math.random() * (rect.width - size);
      y = Math.random() * (rect.height - size);

      for (let p of placed) {
        let dx = p.x - x;
        let dy = p.y - y;
        if (Math.sqrt(dx*dx + dy*dy) < 80) safe = false;
      }
    }

    placed.push({x,y});

    div.style.left = x + "px";
    div.style.top = y + "px";
    div.style.width = size + "px";
    div.style.height = size + "px";
    div.style.fontSize = size * 0.3 + "px";

    div.onclick = () => checkAnswer(c, div);

    optionsDiv.appendChild(div);
  });

  // 🔥 準心模式 → 啟動移動靶
  if (mode === "aim") {
    startMovingTargets();
  }
  
}

// 判斷
function checkAnswer(c, div) {
  const q = questions[current];

  if (c === q.romaji) {
    div.style.background = "green";
    setTimeout(nextQuestion, 200);
  } else {
    div.style.background = "red";
  }
}

// 下一題
function nextQuestion() {
  current++;
  if (current >= questions.length) {
    alert("完成！時間：" + document.getElementById("timer").innerText);
    location.reload();
  } else {
    showQuestion();
  }
}

function startMovingTargets() {
  const targets = document.querySelectorAll(".option");
  const container = document.getElementById("options");
  const rect = container.getBoundingClientRect();

  targets.forEach(div => {

    // 每個靶不同速度
    let vx = (Math.random() - 0.5) * 2;
    let vy = (Math.random() - 0.5) * 2;

    function move() {
      let x = parseFloat(div.style.left);
      let y = parseFloat(div.style.top);
      let size = parseFloat(div.style.width);

      x += vx;
      y += vy;

      // 邊界反彈
      if (x <= 0 || x + size >= rect.width) vx *= -1;
      if (y <= 0 || y + size >= rect.height) vy *= -1;

      div.style.left = x + "px";
      div.style.top = y + "px";

      requestAnimationFrame(move);
    }

    move();
  });
}

</script>

</body>
</html>
